  /media/changes:
    post:
      summary: Query Changes In Media Library
      description: Returns a list of media object ids that are known to have changed since the last call to this method with the specified session id.  Note that it is not guaranteed to return every change; only those that the gateway has noticed.  Calling this wilth the update parameter set provides a way for the gateway to notify the client that it may need to refresh its browse content.
      parameters:
        - name: body
