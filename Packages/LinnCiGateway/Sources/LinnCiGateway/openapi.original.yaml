#                  type: string
#                  description: Identifier of the subscribed media item.
#      tags:
#        - API V2 - Media
#      responses:
#        '200':
#          $ref: '#/responses/success'
#        default:
#          $ref: '#/responses/default'
  /V2/media/select:
    post:
      summary: Select media content for playback
      description: |
        Selects some media item for playback in the given room.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              required:
              - media_id
              properties:
                media_id:
                  description: Identifier that specifies what should be played.  The id is obtained either through a browse/link/match/search request or from the current play queue.
                  type: string
                queue:
                  description: If the item is queueable, specifies how it should modify the play queue.  If not specified, last is assumed.  If the item is not queueable, this parameter is ignored. `now` places the item(s) before what is currently playing, stops play and starts playing the new items. `next` places the item(s) after the currently playing item; `last` places the item(s) at the end of the queue; `replace` replaces the whole queue with the given item(s).
                  type: string
                  enum:
                    - now
                    - next
                    - last
                    - replace
      tags:
        - API V2 - Media
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/media/favourite:
    post:
      summary: Set or clear favourite flag for a media item
      description: Marks or unmarks a media item as a favourite.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - type: object
              required:
              - media_id
              - favourite
              properties:
                media_id:
                  type: string
                  description: Identifier of the item to mark or unmark as a favourite.
                favourite:
                  type: boolean
                  description: True to set as favourite, false to clear.
      tags:
        - API V2 - Media
      responses:
        '200':
          $ref: '#/responses/success'
        default:
          $ref: '#/responses/default'

definitions:
  APIVersionResponse:
    type: object
    properties:
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        type: object
        description: Information about API version.
        properties:
          currentVersion:
            type: string
            description: Version of this API used by the device.
          minimumClientVersion:
            type: string
            description: Requests from clients coded against this version of the API or later will be handled correctly and the responses will be as expected, i.e. no changes or additions to the structure or types of content.  Clients coded against earlier versions of the API may have requests rejected or unexpected data in the responses.
  Error:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      code:
        type: integer
        format: int32
        description: Unique code for the error
      message:
        type: string
        description: Human-readable message describing the error
      fields:
        description: Arbitrary list of additional information about the error; can vary according to the error, may be null.
        type: array
        items:
          type: object
  FilterSpec:
    type: object
    properties:
      path:
        type: string
        description: The command to which the filter applies
      filter:
        type: string
        description: The filter to apply; null if no filter (this can happen if all information is required but incremental is true)
      incremental:
        type: boolean
        description: true if responses from this command should only contain items that have changed since the previous response; false if full information should be returned each time.
  SessionData:
    type: object
    description: Session information.
    properties:
      locale:
        type: string
        description: Locale being used for this session.
      filters:
        description: Filters being applied for this session
        type: array
        items:
          $ref: '#/definitions/FilterSpec'
  SessionResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        $ref: '#/definitions/SessionData'
  HouseTopologyData:
    type: object
    description: The topology of the house.
    properties:
      hasMultiroom:
        type: boolean
        description: True if the house supports multi-room grouping.
      rooms:
        type: array
        description: Array of rooms in the house.
        items:
          type: object
          description: Information pertaining to a room in the house.
          properties:
            id:
              type: string
              description: Unique room ID
            name:
              type: string
              description: Human-readable name of the room.
            standbyState:
              $ref: '#/definitions/StandbyStateEnum'
            satellites:
              type: array
              description: List of rooms slaved to this room.
              items:
                type: string
                description: ID of satellite room.
            roomReceiverEnabled:
              type: boolean
              description: True if this room has the ability to be a room receiver enabled.
            listeningTo:
              type: string
              description: ID of the RoomSender room to which this room is listening; null if not listening.
            listeners:
              type: array
              description: List of RoomReceiver rooms listening to this one as a RoomSender.
              items:
                type: string
                description: ID of listening room.
            availableListeners:
              type: array
              description: List of RoomReceiver rooms that are able to be added to listeners but which are not currently listening.
              items:
                type: string
                description: ID of available room.
  HouseServicesData:
    type: object
    description: The services of the house.
    properties:
      name:
        type: string
        description: Name of the service
      class:
        type: string
        description: Class of the service
      browsable:
        type: boolean
        description: Describes whether the service is available for further browsing
  HouseTopologyResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        $ref: '#/definitions/HouseTopologyData'
  HouseServicesResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      services:
        $ref: '#/definitions/HouseServicesData'
  StandbyStateEnum:
    type: string
    description: The standby state of a room.
    enum:
      - OFF
      - MIXED
      - ON
  BoolTypeSpec:
    type: object
    properties:
      readonly: 
        type: boolean
        description: If true, the property cannot be changed (default false)
  EnumTypeSpec:
    type: object
    properties:
      enum:
        type: array
        items:
          type: string
      readonly: 
        type: boolean
        description: If true, the property cannot be changed (default false)
  IntTypeSpec:
    type: object
    properties:
      minimum:
        type: integer
      maximum:
        type: integer
      readonly: 
        type: boolean
        description: If true, the property cannot be changed (default false)
  RoomStateResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      room:
        type: string
        description: ID of room to which this response corresponds.
      data:
        $ref: '#/definitions/RoomState'
  RoomStateSpec:
    type: object
    description: The settings available for the room. If a property is not present in this response, the room does not have that setting available.
    properties:
      standby:
        description: If present, room has standby control.
        allOf:
          - $ref: '#/definitions/BoolTypeSpec'
      standbyState:
        description: If present, room has standby state feedback.
        allOf:
          - $ref: '#/definitions/EnumTypeSpec'
      mute:
        description: If present, room can be muted.
        allOf:
          - $ref: '#/definitions/BoolTypeSpec'
      volume:
        description: If present, volume can be set using a 0-100 scale, with a possible limit on the maximum value specified by the maximum property.
        allOf:
          - $ref: '#/definitions/IntTypeSpec'
  RoomStateSpecResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      room:
        type: string
        description: Room to which this response corresponds.
      data:
        $ref: '#/definitions/RoomStateSpec'
  RoomState:
    type: object
    description: The source, power, mute and volume status of the room.
    properties:
      standby:
        type: boolean
        description: true if the room is currently powered, else false.
      standbyState:
        $ref: '#/definitions/StandbyStateEnum'
      mute:
        type: boolean
        description: true if the room is currently muted, else false.
      volume:
        description: Volume level as a percentage.
        type: integer
        minimum: 0
        maximum: 100
  RoomPlayControlSpec:
    type: object
    description: Indicates what playback properties are available. If a property is not present in this response, the corresponding parameter in `/room/playback` cannot be used or displayed with the current source/item.
    properties:
      action:
        description: If present, describes valid play actions for the current playback. i.e. whether play/pause/stop is possible. The returned array of strings can contain any combination of "play", "pause" and "stop", including none at all to indicate no operations available.
        allOf:
          - $ref: '#/definitions/EnumTypeSpec'
      queue_index:
        description: |
          If present, current playback is from the queue. readonly property indicates if client can set the queue position or use skip_track.

          If the queue index can be set, the minimum value is 0 and the maximum is defined by RoomPlayState.queue_length - 1.
        allOf:
          - $ref: '#/definitions/BoolTypeSpec'
      position:
        description: |
          If present, current playback position is tracked. readonly property indicates if client can set (seek to) the playback time by seetting position.

          If offset can be set, min/max values are defined by RoomPlayState.position_min/max.
        allOf:
          - $ref: '#/definitions/BoolTypeSpec'
      repeat:
        description: If present, current playback has a repeat mode. readonly property indicates if client can set this.
        allOf:
          - $ref: '#/definitions/BoolTypeSpec'
      shuffle:
        description: If present, current playback has a shuffle mode. readonly property indicates if client can set this.
        allOf:
          - $ref: '#/definitions/BoolTypeSpec'
  RoomPlayState:
    type: object
    description: The playback state of the room.
    properties:
      transport_state:
        type: string
        enum:
          - stop
          - play
          - pause
          - buffering
          - waiting
          - unknown
        description: Current transport state.
      queue_index:
        type: integer
        format: int32
        description: Zero based index of current track in play queue. null if current item is not in the queue.
      queue_length:
        type: integer
        format: int32
        description: Total tracks in play queue. null if the current item is not in the queue.
      position:
        type: integer
        format: int32
        description: Current playback position (in seconds) in track. null if not applicable to current playback (e.g. input). Events will only be sent on a seek or track change.
      position_min:
        type: integer
        format: int32
        description: Minimum playback position that can be set for the current track (may not be zero due to buffering limitations).  Can be null if seeking not possible or if its value would be zero.
      position_max:
        type: integer
        format: int32
        description: Maximum playback position that can be set for the current track (may not be the same as the duration of the track due to buffering limitations).  Can be null if seeking not possible.
      repeat:
        type: boolean
        description: Current repeat mode.
      shuffle:
        type: boolean
        description: Current shuffle mode.
      skip_track:
        type: integer
        format: int32
        description: Number of tracks being skipped in repeating skip.  May be null.
      skip_repeat:
        type: integer
        format: int32
        description: Number of times remaining to repeat the skip operation (unless cancelled).  May be null.
      skip_interval:
        type: integer
        format: int32
        description: Number of seconds between each skip repetition.  May be null.
      channel:
        type: object
        description: Metadata about the channel.
        properties:
          name:
            type: string
            description: Name of channel
          type:
            type: string
            description: General type of channel (e.g. Rock, Speech)
          art_uri:
            type: string
            description: URI of artwork for the channel
            format: uri
      details:
        type: object
        description: Details of the encoding of the current item
        properties:
          bit_depth:
            type: integer
            description: Bit depth of the item
          bit_rate:
            type: integer
            description: Bit rate of the item (bps)
          codec_name:
            type: string
            description: Codec used to encode the item
          duration:
            type: integer
            description: Total length of item in seconds. 0 if unknown.  May differ from max_position if, due to buffering, the item is longer than the maximum seek position.
          lossless:
            type: boolean
            description: true if the encoding used was lossless.
          sample_rate:
            type: integer
            description: Sample rate of the encoding (Hz)
      metatext:
        type: string
        description: Channel level (as opposed to track level) metadata string.
      metadata:
        $ref: '#/definitions/ItemMetaData'
  RoomPlayStateResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      room:
        type: string
        description: Room to which this response corresponds.
      data:
        $ref: '#/definitions/RoomPlayState'
  RoomPlayStatePositionResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      room:
        type: string
        description: Room to which this response corresponds.
      data:
        type: object
        description: The playback position of the room.
        properties:
          position:
            type: integer
            format: int32
            description: Current playback position (in seconds) in track. 
          position_min:
            type: integer
            format: int32
            description: Minimum playback position that can be set for the current track (may not be zero due to buffering limitations).  Can be null if seeking not possible or if its value would be zero.
          position_max:
            type: integer
            format: int32
            description: Maximum playback position that can be set for the current track (may not be the same as the duration of the track due to buffering limitations).  Can be null if seeking not possible.
  RoomPlayControlSpecResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      source:
        type: string
        description: Source to which this response corresponds.
      data:
        $ref: '#/definitions/RoomPlayControlSpec'
  RoomEndPointsResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      room:
        type: string
        description: Room to which this response corresponds.
      data:
        $ref: '#/definitions/MediaBrowseData'
  MediaBrowseResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        $ref: '#/definitions/MediaBrowseData'
  MediaBrowseData:
    type: object
    description: Browse data for a given item in the player's browseable content.
    properties:
      id:
        type: string
        description: The unique identifier for the browsed object
      content_revision:
        type: integer
        description: Current revision number for the content library.  If this has changed since the previous browse response, the structure of the library has changed in some way and cached values should not be relied upon.
      index:
        description: Index of first child in the children array.
        type: integer
      count:
        description: Count of children in the children array.
        type: integer
      total:
        description: Total number of children that are available to be fetched.
        type: integer
      alpha:
        description: Array of 27 indicies into the child content corresponding to where content starts for each letter in the alphabet plus other non-alpha content.  Can be null if no index is available (e.g. unsorted content).
        type: array
        items:
          type: integer
          minItems: 27
          maxItems: 27
      children:
        description: Array of metadata for children of the browsed item.  May be null if item is not browseable (different from an empty array, when the item is browseable but has no children).
        type: array
        items:
          $ref: '#/definitions/ItemMetaData'
  MediaChangesResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        $ref: '#/definitions/MediaChangesData'
  MediaChangesData:
    type: object
    description: List of media object ids that have changed.
    properties:
      content_revision:
        type: integer
        description: Current revision number for the content library.  Can be cross-checked against the values returned by previous browse opeartions to see if they might be stale.
      ids:
        description: The identifiers of any media items that are known to have changed.
        type: array
        items:
          type: string
  MetadataDisplayOptionsResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        $ref: '#/definitions/MetadataDisplayOptionsData'
  MetadataDisplayOptionsData:
    type: object
    description: Information on how to display the given class of metadata.
    properties:
      class:
        type: string
        description: The class identifier for the metadata
      ordering:
        description: Array of items describing each member of the metadata of this class.  The ordering of the array indicates the priority of displaying the metadata if there is limited space available to do so (e.g. only two or three lines).
        type: array
        items:
          $ref: '#/definitions/MetadataDisplayOptionsItem'
  MetadataDisplayOptionsItem:
    type: object
    description: Information on how to display a given item of metadata.
    properties:
      path:
        description: Path to indicate the item of metadata referred to.  The path is relative to the data structure returned by /room/play_state and is defined that way to allow the inclusion of metadata from the channel etc. as well as that of the item itself.
        type: string
      title:
        description: Human-readable string to label the metdata (e.g. "Album", "Artist").  The title will be returned in the language defined by the current session.
        type: string
      show_title:
        description: Flag to indicate that the title should always be displayed, even in limited space now playing screens, in order to make its meaning clear.  Some metadata items may be hard to interpret without an associated label.
        type: boolean
      show_blank:
        description: Flag to indicate that the value should be shown (as an empty field) even if uninitialised.  If this is false then the client will skip this value and continue with later values in the array until all its available display fields are filled.
        type: boolean
  PlaylistCreateResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        $ref: '#/definitions/ItemMetaDataPlaylist'
  ClassesResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        $ref: '#/definitions/ClassesData'
  ClassesData:
    type: object
    description: Class data for the system.
    properties:
      index:
        description: Index of first class in the classes array.
        type: integer
      count:
        description: Count of classes in the classes array.
        type: integer
      total:
        description: Total number of classes that are available to be fetched.
        type: integer
      classes:
        description: Array of metadata for classes in the system
        type: array
        items:
          $ref: '#/definitions/ClassMetaData'
  ActionsResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        $ref: '#/definitions/ActionsData'
  ActionsData:
    type: object
    description: Action data for the system.
    properties:
      class:
        description: Id of the class for which these are the actions; null if all actions in the system.
      index:
        description: Index of first action in the actions array.
        type: integer
      count:
        description: Count of actions in the actions array.
        type: integer
      total:
        description: Total number of actions that are available to be fetched (for the class, if class specified, else the whole system).
        type: integer
      actions:
        description: Array of metadata for action in the system
        type: array
        items:
          $ref: '#/definitions/ActionMetaData'
  ClassMetaData:
    type: object
    description: Information about a class of object in the system (e.g. album, track or stream)
    properties:
      id:
        type: string
        description: Unique identifier for the class (used in class property of item metadata)
      name:
        type: string
        description: Title of the class
      actions:
        description: Array of actions ids that are valid for objects of this class.
        type: array
        items:
          type: string
  ActionMetaData:
    type: object
    description: Information about an action in the system
    properties:
      id:
        type: string
        description: Unique identifier for the action
      name:
        type: string
        description: Human-readable title for the action
      path:
        type: string
        description: | 
          The path of the action.   Parameters are marked as ${xxx} and should be replaced by the corresponding value before executing the action.  xxx is currently one of:
          item.id - the id of the item for which this action was selected;
          room.id - the id of the room in which this action will be performed;
          choice.id - the id of the item chosen by performing the browse or query given in choice_path and letting the user choose one of the resulting items
          user.string - a string obtained from the user through some form of prompting
      choice_path:
        type: string
        description: If non-null, the path of a browse or query command to perform and present the results to the user to allow them to select one, the id of which will then replace ${choice.id} in the main action path.  If choice_path contains any ${xxx} parameters then they should be replaced before performing the query as described in path above.
      confirmation:
        type: string
        description: If non-null, the user should be presented with this message and given a yes/no choice as to whether to continue (used for destructive actions).  ${item.name} in the message should be replaced by the name of the object on which the action is being performed; ${user.string} by the string entered by the user.
      destructive:
        type: boolean
        description: true if this action causes changes to the browse structure, necessitating a refresh.
  ItemMetaData:
    type: object
    description: Information about an item in the system (e.g. album, track or stream, input)
    discriminator: class
    properties:
      id:
        type: string
        description: The unique identifier for the browsed object.  Can be used to browse children or play the item.
      class:
        type: string
        description: A class id that defines the type of item, which in turn defines what operations it supports.
      buffering: 
        type: boolean
        description: true if the item is being buffered to play.  false if not.  Not present (null) if metadata is not for an item in a room's playlist.
      playing: 
        type: boolean
        description: true if the item is being played.  false if not.  Not present (null) if metadata is not for an item in a room's playlist.
      selected: 
        type: boolean
        description: true if the item is selected for play.  false if not.  Not present (null) if metadata is not for an item in a room's playlist.
      name:
        type: string
        description: Title of the item.  What this is will vary according to the item type, but the intention is that this should be the string that best represents the item if it is the only string displayed for it.
      art_uri:
        type: string
        description: URL for associated logo/album art for item. Can be null.
      disabledActions:
        type: array
        description: |
          List of action ids of actions that are valid for this item's class but which this particular item does not currently support (e.g. can't favourite a curerntly favourited item).
        items:
          type: string
          description: Action id of disabled action
    required:
    - id
    - class
  ItemMetaDataTrack:
    description: class 'md.track' A track with title/album/artist info
    allOf: 
    - $ref: '#/definitions/ItemMetaData'
    - $ref: '#/definitions/TitleAlbumArtist'
    - type: object
      properties:
        duration:
          type: integer
          format: int32
          description: Duration of the item in seconds. 0 if unknown
  ItemMetaDataContainer:
    description: class 'md.container' Base for any item that can contain other items
    allOf: 
    - $ref: '#/definitions/ItemMetaData'
    - type: object
      properties:
        contained_classes:
          type: array
          description: Array of class ids indicating the type(s) of the content of this item.
          items:
            type: string
        count:
          type: integer
          format: int32
          description: Number of direct children of the container. -1 if unknown
  ItemMetaDataAlbum:
    description: class 'md.album' A collection representing an album
    allOf: 
    - $ref: '#/definitions/ItemMetaDataContainer'
    - $ref: '#/definitions/TitleAlbumArtist'
  ItemMetaDataPlaylist:
    description: class 'md.playlist' A playlist containing other media items
    allOf: 
    - $ref: '#/definitions/ItemMetaDataContainer'
  ItemMetaDataTidalTrack:
    description: class 'md.track.tidal' A track from Tidal
    allOf: 
    - $ref: '#/definitions/ItemMetaDataTrack'
    - $ref: '#/definitions/FavouriteState'
    - $ref: '#/definitions/RefAlbumArtist'
  ItemMetaDataTidalAlbum:
    description: class 'md.album.tidal' An album from Tidal
    allOf: 
    - $ref: '#/definitions/ItemMetaDataAlbum'
    - $ref: '#/definitions/FavouriteState'
    - $ref: '#/definitions/RefArtist'
  ItemMetaDataTidalPlaylist:
    description: class 'md.playlist.tidal' A playlist from Tidal
    allOf: 
    - $ref: '#/definitions/ItemMetaDataPlaylist'
    - $ref: '#/definitions/FavouriteState'
  FavouriteState:
    type: object
    properties:
      isFavourite:
        type: boolean
        description: True if favourited, false if not.  The presence of this attribute indicates that the item can be marked as a favourite.
  TitleAlbumArtist:
    type: object
    properties:
      title:
        type: string
        description: Track title
      album:
        type: string
        description: Album name
      artist:
        type: string
        description: Artist name
  RefAlbum:
    type: object
    properties:
      album_id:
        type: string
        description: Media id of the album from which this item comes.
  RefArtist:
    type: object
    properties:
      artist_id:
        type: string
        description: Media id of the artist that created this item.
  RefAlbumArtist:
    description: Reference related album and artist
    allOf:
    - $ref: '#/definitions/RefAlbum'
    - $ref: '#/definitions/RefArtist'
  VisibleSource:
    type: object
    properties:
      displayName:
        type: string
        description: User set name of source
      systemName:
        type: string
        description: System/default name of source
      type:
        type: string
        description: Type of source
  
  # Parameter definitions for the body of the POST request

  ParamFilter:
    type: object
    properties:
      filter:
        description: The parts of the `data` object of the response that are wanted as a list of JsonPath values. This overrides any session filter. See /session/filter for more details.
        type: array
        items:
          type: string

  ParamRoom:
    type: object
    required: 
    - room
    properties:
      room:
        description: Room ID
        type: string

  ParamRoomOptional:
    type: object
    properties:
      room:
        description: Room ID
        type: string

  ParamSession:
    type: object
    required: 
    - session
    properties:
      session:
        description: Opaque string, returned in the response.  Fixed for a session.
        type: string

  ParamSessionOptional:
    type: object
    properties:
      session:
        description: Opaque string, returned in the response.  Fixed for a session.
        type: string

  ParamTag:
    type: object
    properties:
      tag:
        description: Opaque string, returned in the response. Varies per message.
        type: string

  ParamUpdate:
    type: object
    properties:
      update:
        description: |
          *(Only applicable to WebSocket connections.)*

          If non-zero, the device will send out asynchronous updates whenever the response data for the operation changes. The value of updates specifies the minimum time, in seconds between updates. 0 cancels sending updates, and the update state is left unchanged if the parameter omitted.

          If a session ID is specified, the update data will be formatted according to the locale and filter settings for that session.

          If a tag is specified, this will be returned with every asynchronous response.
        type: integer

# V2 definitions
  V2APIVersionResponse:
    type: object
    properties:
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        type: object
        description: Information about API version.
        properties:
          currentVersion:
            type: string
            description: Version of the API currently in use.
          onDevice:
            type: boolean
            description: Is the API in use running on a DS device.
  V2TopologyStatusResponse:
    type: object
    properties:
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        $ref: '#/definitions/V2TopologyStatusData'
      session:
        type: string
        description: Session from the original request that generated this response.
  V2TopologyStatusData:
    type: object
    description: The topology of the house.
    properties:
      rooms:
        type: array
        description: Array of rooms in the house.
        items:
          type: object
          description: Information pertaining to a room in the house.
          properties:
            name:
              type: string
              description: Human-readable name of the room.
            udn:
              type: string
              description: Unique device name of the room.
            location:
              type: string
              description: Host IPv4 address of the room.
            isStaticZoneReceiver:
              type: boolean
              description: Is the room a static zone receiver.
            staticZoneReceivers:
              type: array
              description: List of static zone receivers listening to this room (only applies to Kustom DSM streams).
              items:
                type: string
                description: Human-readable name of the static zone receiver.          
            listeners:
              type: array
              description: List of rooms currently listening to this room.
              items:
                type: string
                description: Human-readable name of the listening room.
  V2ProductStatusResponse:
    type: object
    description: The product status of a room
    properties:
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        $ref: '#/definitions/V2ProductStatusData'
      session:
        type: string
        description: Session from the original request that generated this response.
      room:
        type: string
        description: The room name for which this response pertains
  V2ProductStatusData:
    type: object
    description: The product status of the room.
    properties:
      standby:
        type: boolean
        description: Standby status of the the room
  V2SourcesStatusResponse:
    type: object
    description: The sources status of a room.
    properties:
      tag:
        type: string
        description: Tag from the original request that generated this response.
      visible_sources:
        type: array
        description: Array of visible source for the room.
        items:
          type: object
          description: Information pertaining to a visible source for the room.
          properties:
            system_name:
              type: string
              description: System name of the source.
            display_name:
              type: string
              description: Display name of the source defined by the user.
            type:
              type: string
              description: The type to which the source belongs
      session:
        type: string
        description: Session from the original request that generated this response.
      room:
        type: string
        description: The room name for which this response pertains
  V2VolumeStatusResponse:
    type: object
    description: The volume status of a room
    properties:
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        $ref: '#/definitions/V2VolumeStatusData'
      session:
        type: string
        description: Session from the original request that generated this response.
      room:
        type: string
        description: The room name for which this response pertains
  V2VolumeStatusData:
    type: object
    description: The volume status of the room.
    properties:
      mute:
        type: boolean
        description: Current mute state of the room.
      volume:
        type: integer
        format: int32
        description: The volume state of the room. 
  V2TransportStatusResponse:
    type: object
    description: The transport status of a room
    properties:
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        $ref: '#/definitions/V2TransportStatusData'
      session:
        type: string
        description: Session from the original request that generated this response.
      room:
        type: string
        description: The room name for which this response pertains
  V2TransportStatusData:
    type: object
    description: The transport status of the room.
    properties:
      transport_state:
        type: string
        description: Current transport state of the room
      shuffle:
        type: boolean
        description: The shuffle state of the room (hidden for sources where not relevant)
      repeat:
        type: boolean
        description: The shuffle state of the room (hidden for sources where not relevant)
  V2SeekStatusResponse:
    type: object
    description: The seek status of a room
    properties:
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        $ref: '#/definitions/V2SeekStatusData'
      session:
        type: string
        description: Session from the original request that generated this response.
      room:
        type: string
        description: The room name for which this response pertains
  V2SeekStatusData:
    type: object
    description: The transport status of the room.
    properties:
      seekable:
        type: boolean
        description: Is the room's current source seekable
      elapsed:
        type: integer
        format: int32
        description: Seconds elapsed for current media item
      duration:
        type: integer
        format: int32
        description: Duration in seconds for current media item
  V2MetadataStatusResponse:
    type: object
    description: The metadata status of a room
    properties:
      tag:
        type: string
        description: Tag from the original request that generated this response.
      metadata:
        $ref: '#/definitions/V2MetadataStatusData'
      session:
        type: string
        description: Session from the original request that generated this response.
      room:
        type: string
        description: The room name for which this response pertains
  V2MetadataStatusData:
    type: object
    description: The metadata status of the room.
    properties:
      line_1:
        type: string
        description: First line of metadata. Will contain track name, radio station name or external source name depending on active source
      line_2:
        type: string
        description: Second line of metadata. Will contain artist names, radio metatext or return empty depending on active source
      line_3:
        type: string
        description: Third line of metadata. Will contain album name or bit rate depending on active source
      art_uri:
        type: string
        description: Metadata artwork URI for current playback
      audio_format:
        type: string
        description: Audio format for current playback
      sample_rate:
        type: string
        description: Sample rate for current playback
      bit_depth:
        type: string
        description: Bit depth for current playback
  V2PinsStatusResponse:
    type: object
    description: The pins status of a room
    properties:
      tag:
        type: string
        description: Tag from the original request that generated this response.
      data:
        $ref: '#/definitions/V2PinsStatusData'
      session:
        type: string
        description: Session from the original request that generated this response.
      room:
        type: string
        description: The room name for which this response pertains
  V2PinsStatusData:
    type: object
    description: The pins status of the room.
    properties:
      pin_list:
        type: array
        description: Array of information for pins of the room.
        items:
          type: object
          description: Information pertaining to a pin for the room.
          properties:
            id:
              type: string
              description: Media id for selection of the pin.
            name:
              type: string
              description: Name of the contents of the pin.
            art_uri:
              type: string
              description: Artwork URI for the contents of the pin.
  V2ServicesStatusResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      room:
        type: string
        description: Room to which this response corresponds.
      data:
        $ref: '#/definitions/V2ServicesStatusData'
  V2ServicesStatusData:
    type: object
    description: Browse data for a given item in the player's browseable content.
    properties:
      id:
        type: string
        description: The name of the room to which the services belong
      content_revision:
        type: integer
        description: Current revision number for the content library.  If this has changed since the previous browse response, the structure of the library has changed in some way and cached values should not be relied upon.
      index:
        description: Index of first service in the children array.
        type: integer
      count:
        description: Count of services in the children array.
        type: integer
      total:
        description: Total number of services that are available to be fetched.
        type: integer
      children:
        description: Array of services
        type: array
        items:
          $ref: '#/definitions/V2ServicesStatusItem'
  V2ServicesStatusItem:
    type: object
    description: Data of a service
    properties:
      id:
        type: string
        description: The ID used to further query the service
      name:
        type: string
        description: The name of the service
      class:
        type: string
        description: The class of the service
  V2PlaylistBrowseResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      room:
        type: string
        description: The room name for which this response pertains
      data:
        $ref: '#/definitions/V2PlaylistBrowseData'
  V2PlaylistBrowseData:
    type: object
    description: Browse data for a given item in the player's browseable content.
    properties:
      index:
        description: Index of first child in the children array.
        type: integer
      count:
        description: Count of children in the children array.
        type: integer
      total:
        description: Total number of children that are available to be fetched.
        type: integer
      children:
        $ref: '#/definitions/V2PlaylistBrowseIndex'
  V2PlaylistSubscribeResponse:
    type: object
    properties:
      session:
        type: string
        description: Session from the original request that generated this response.
      tag:
        type: string
        description: Tag from the original request that generated this response.
      room:
        type: string
        description: The room name for which this response pertains
      data:
        $ref: '#/definitions/V2PlaylistSubscribeData'
  V2PlaylistSubscribeData:
    type: object
    description: Browse data for a given item in the player's browseable content.
    properties:
      content_revision:
        type: integer
        description: Current revision number for the playlist update. Increments by 1 on every update. If using 'concise' updates an there is a break in update contiguity then client should resubscribe.
      index:
        description: Index of first child in the children array.
        type: integer
      count:
        description: Count of children in the children array.
        type: integer
      total:
        description: Total number of children that are available to be fetched.
        type: integer
      children:
        $ref: '#/definitions/V2PlaylistBrowseIndex'
  V2PlaylistBrowseIndex:
    type: object
    description: Index of a position in a rooms playlist and the item metadata it contains.
    properties:
      index:
        $ref: '#/definitions/V2PlaylistItemMetadata'
  V2PlaylistItemMetadata:
    type: object
    description: Information about an item in the system (e.g. album, track or stream, input)
    discriminator: class
    properties:
      class:
        type: string
        description: A class id that defines the type of item, which in turn defines what operations it supports.
      buffering: 
        type: boolean
        description: true if the item is being buffered to play.  false if not.  Not present (null) if metadata is not for an item in a room's playlist.
      playing: 
        type: boolean
        description: true if the item is being played.  false if not.  Not present (null) if metadata is not for an item in a room's playlist.
      selected: 
        type: boolean
        description: true if the item is selected for play.  false if not.  Not present (null) if metadata is not for an item in a room's playlist.
      name:
        type: string
        description: Title of the item.  What this is will vary according to the item type, but the intention is that this should be the string that best represents the item if it is the only string displayed for it.
      art_uri:
        type: string
        description: URL for associated logo/album art for item. Can be null.
      disabledActions:
        type: array
        description: |
          List of action ids of actions that are valid for this item's class but which this particular item does not currently support (e.g. can't favourite a curerntly favourited item).
        items:
          type: string
          description: Action id of disabled action
    required:
    - class

responses:
  default:
    description: |
      An error, with one of the following HTTP codes:
       * __400__ request failed
       * __404__ unknown path
       * __410__ unknown session ID
       * __500__ device error
    schema:
      $ref: '#/definitions/Error'
  no_error:
    description: Command completed succesfully.
    schema:
      type: object
      properties:
        session:
          type: string
          description: Session from the original request that generated this response.
        tag:
          type: string
          description: Tag from the original request that generated this response.
    examples:
      application/json:
        session: s.06
        tag: tag_01
  success:
    description: Room targeted command completed succesfully.
    schema:
      type: object
      properties:
        tag:
          type: string
          description: Tag from the original request that generated this response.
        session:
          type: string
          description: Session from the original request that generated this response.
    examples:
      tag: tag_01
      session: session_id
  success_room:
    description: Room targeted command completed succesfully.
    schema:
      type: object
      properties:
        tag:
          type: string
          description: Tag from the original request that generated this response.
        room:
          type: string
          description: The target room of the original request that generated this response.
        session:
          type: string
          description: Session from the original request that generated this response.
    examples:
      tag: tag_01
      room: Main Room
      session: session_id

tags:
  - name: Session
    description: Set-up and control of a session with the client.
  - name: House
    description: Control/information for multiple rooms.
  - name: Room
    description: Control/information of a single given room.
  - name: Updates
    description: Commands that can be set-up to provide aysnchronous notification of changes in state.
  - name: Browse
    description: Commands that return information and references to playable media content.
  - name: Playlist
    description: Commands that relate to playlists.
  - name: Presets
    description: Commands that relate to presets.
  - name: Queue
    description: Commands that list or modify the current play queue.
  - name: API V2
    description: Beta API
  - name: API V2 - Playlist
    description: Commands that relate to a room's playlist.
  - name: API V2 - Services
    description: Commands that relate to services.
  - name: API V2 - Media
    description: Commands that relate to media.