swagger: '2.0'
info:
  title: Linn Network Control Protocol
  description: Network control protocol for Linn DS and OpenHome
  #version: 4.1.105
  version: '4.1.54'
host: www.janustechnology.co.uk
schemes:
  - http
basePath: /lncp
produces:
  - application/json
paths:
  /api/version:
    post:
      summary: Query API version
      description: |
        Get version information about this API.  This API request is guaranteed to always exist and always return the same format response to allow clients to determine whether they are compatible with this system.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
      tags:
        - House
      responses:
        '200':
          description: API version information
          schema:
            $ref: '#/definitions/APIVersionResponse'
          examples:
            tag: tag_01
            data:
              currentVersion: 1.0.0
              minimumClientVersion: 1.0.0
        default:
          $ref: '#/responses/default'
  /session/create:
    post:
      summary: Create a Session
      description: |
        Sessions provide a mechanism for specifying on-going settings just once (e.g. filtering, language choice).  They also provide a context for asynchronous events.  The return session id is required alongside the tag for further requests.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamTag'
            - type: object
              properties:
                userAgent:
                  description: Information about the control system creating a session, formatted in the form of, {identifier}/{version}, e.g. Linn Crestron/4.2.1.
                  type: string
                timeout:
                  description: If the connection to the device is via a protocol that does not keep a connection open (e.g. discrete HTTP requests) then this parameter gives a timeout in seconds.  The device is permitted to discard any session-related data if it has not received a message containing this session ID after this many seconds.
                  type: integer
                locale:
                  description: Set desired locale. List of locales in order of preference. Locale specified as ll[_CC] using ISO 639 (language) and ISO 3166-1 alpha-2 (2-letter country) codes.  If the device is unable to support any of the locales, it will still send back a 200 response, but the locale value will show the default locale that has been chosen instead. This is a short-cut to allow creating a session and choosing a locale in one call rather than calling /sesion/locale separately.
                  type: array
                  items:
                    type: string
      tags:
        - Session
      responses:
        '200':
          description: Current session data.  The session ID will be a new one generated by the device that is unique within the connecting context, i.e. if connected by HTTP, not currently used by any other HTTP client; if connected by WebSocket, not previously used within that connection.
          schema:
            $ref: '#/definitions/SessionResponse'
          examples:
            application/json:
              session: s.01
              tag: command1
              data:
                locale: en_GB
        default:
          $ref: '#/responses/default'
  /session/destroy:
    post:
      summary: End a Session
      description: Inform the device that a session is stopping. Any information held about the session can be discarded.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamTag'
      tags:
        - Session
      responses:
        '200':
          description: Acknowledgement of session ending. Also used as an event to indicate a device terminating a session.
          schema:
            type: object
            properties:
              session:
                type: string
                description: Session ID of the terminated session.
              tag:
                type: string
                description: Tag from the original request that generated this response.
          examples:
            application/json:
              session: s.01
        default:
          $ref: '#/responses/default'
  /session/locale:
    post:
      summary: Query or Set Session Locale
      description: This queries or sets the locale for the given session (not specifying the locale parameter just returns the current setting).  Any language or locale dependent strings returned by subsequent API calls that specify the same session ID will be localised according to the selected locale (if it is supported).
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamTag'
            - type: object
              properties:
                locale:
                  description: Set desired locale. List of locales in order of preference. Locale specified as ll[_CC] using ISO 639 (language) and ISO 3166-1 alpha-2 (2-letter country) codes.  If the device is unable to support any of the locales, it will still send back a 200 response, but the locale value will show the default locale that has been chosen instead.
                  type: array
                  items:
                    type: string
      tags:
        - Session
      responses:
        '200':
          description: Current session data
          schema:
            $ref: '#/definitions/SessionResponse'
          examples:
            application/json:
              session: s.01
              tag: command2
              data:
                locale: es_ES
        default:
          $ref: '#/responses/default'
  /session/filter:
    post:
      summary: Query or Set Session Filter for a Request
      description: |
        Filters allow clients to limit the information returned in the `data` object of the response to a given request. Once a filter has been set up, any subsequent invocation of the request that includes the session ID will have the filter applied.

        Filters are specified using JsonPath, with the root ($) set to the `data` object in the operation response. For more details on JsonPath see https://developer.gnome.org/json-glib/stable/JsonPath.html.

        Examples of filtering the `/room/play_state` response
         * to just the name `$.metadata.name`
         * to name,album,artist `$.metadata.name $.metadata.album $.metadata.artist`

      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamTag'
            - type: object
              properties:
                path:
                  description: Request path to which to apply the filter.
                  type: string
                set_filter:
                  description: |
                    A space-separated list of JsonPath expressions to match parts of the `data` node. Unmatched nodes are filtered out.

                    If an asterisk (*): the filter is removed, so the entire `data` node is returned.

                    If "none": only the enclosing response message is returned and not the `data` node (this can be used to reduce traffic if only an acknowledgement of success or failure is required).
                  type: array
                  items:
                    type: string
                incremental:
                  description: If set to true then the device will assume that the client is caching the responses for the given path.  All responses to that command and any asynchronous notifications of the same type will only include properties that have changed.
                  type: boolean
      tags:
        - Session
      responses:
        '200':
          description: Current session data
          schema:
            $ref: '#/definitions/SessionResponse'
          examples:
            application/json:
              session: s.01
              tag: command3
              data:
                locale: zh_CN
                filters:
                  - path: /room/play_state
                    filter: $.metadata.name $.metadata.album $.metadata.artist
                    incremental: true
                  - path: /room/state
                    incremental: true
        default:
          $ref: '#/responses/default'
  /house/topology:
    post:
      summary: Query House Topology
      description: This queries the topology of the house; the rooms within it, how they are related and their current availability.  If the optional room parameter is specified, only information for that room is returned.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamRoomOptional'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamUpdate'
      tags:
        - House
        - Room
        - Updates
      responses:
        '200':
          description: List of rooms
          schema:
            $ref: '#/definitions/HouseTopologyResponse'
          examples:
            application/json:
              session: s.02
              tag: command4
              data:
                hasMultiroom: true
                rooms:
                  - id: r.1
                    name: Living Room
                    standbyState: OFF
                    satellites: []
                    roomReceiverEnabled: true
                    listeners:
                      - r.2
                      - r.3
                    availableListeners: []
                  - id: r.2
                    name: Bedroom
                    standbyState: OFF
                    satellites:
                      - r.3
                    roomReceiverEnabled: true
                    listeningTo: r.1
                    listeners: []
                    availableListeners: []
                  - id: r.3
                    name: En-Suite
                    standbyState: OFF
                    satellites: []
                    roomReceiverEnabled: true
                    listeningTo: r.1
                    listeners: []
                    availableListeners: []
        default:
          $ref: '#/responses/default'
  /house/services:
    post:
      summary: Query House Services
      description: This queries the top-level browse object available for the house and their current availability.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
      tags:
        - House
      responses:
        '200':
          description: List of services
          schema:
            $ref: '#/definitions/HouseTopologyResponse'
          examples:
            application/json:
              session: s.02
              tag: command4
              services:
                rooms:
                  - name: My Queue
                    class: md.room.playlist
                    browsable: true
                  - name: My Radio
                    class: md.room.radio
                    browsable: true
                  - name: My Pins
                    class: md.room.pins
                    browsable: true
                  - name: Spotify
                    class: md.room.spotify
                    browsable: false
        default:
          $ref: '#/responses/default'
  /room/group:
    post:
      summary: Add and remove room grouping
      description: This modifies the grouping of rooms, adding rooms to and removing them from a master room.  The room parameter indicates the master.  The API supports multiple simultaneous additions and removals to avoid an unpleasant slow ripple effect in the UI as the grouping changes one by one.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - type: object
              properties:
                add:
                  description: The ids of the rooms to add to the master room's group.
                  type: array
                  items:
                    type: string
                remove:
                  description: The ids of the rooms to remove from the master room's group.
                  type: array
                  items:
                    type: string
      tags:
        - House
        - Room
      responses:
        '200':
          $ref: '#/responses/no_error'
        default:
          $ref: '#/responses/default'
  /room/state:
    post:
      summary: Query room state
      description: |
        This queries the core settings of a room: standby state, mute and volume. The latest values are returned in the response.  All information returned in the response is guaranteed to be internally consistent.

        The parameters documented here show all possible settings for all products. Use `/room/state/spec` to find out what settings are on the currently connected room.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamUpdate'
            - type: object
              properties:
                group:
                  description: If specified and true and the room is a member of a group, the values returned are for the group as a whole.
                  type: boolean
      tags:
        - Room
        - Updates
      responses:
        '200':
          description: Standby, mute and volume status for a room
          schema:
            $ref: '#/definitions/RoomStateResponse'
          examples:
            application/json:
              data:
                standby: false
                standbyState: OFF
                mute: false
                volume: 50
        default:
          $ref: '#/responses/default'
  /room/state/set:
    post:
      summary: Set room state
      description: |
        This sets the core settings of a room: standby state, mute and volume. If any setting is specified in the parameters, it changed to the new value.

        The parameters documented here show all possible settings for all products. Use `/room/state/spec` to find out what settings are on the currently connected room.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - type: object
              properties:
                group:
                  description: If specified and the room is a group master, all rooms in the group are modified.
                  type: boolean
                standby:
                  description: If specified, sets the standby state of the room.
                  type: boolean
                mute:
                  description: If specified, sets the mute state of the room.
                  type: boolean
                volume:
                  description: If specified, sets the volume of the room as a percentage.
                  type: integer
                  minimum: 0
                  maximum: 100
                volume_step:
                  description: If specified, perform a relative volume level change. Negative values lower the volume. Can be repeated with step_repeat.
                  type: integer
                  format: int32
                step_repeat:
                  description: Number of times to repeat the volume_step operation (unless cancelled).
                  type: integer
                  format: int32
                step_interval:
                  description: Number of milliseconds between each step repetition; only applicable if volume_step specified.
                  type: integer
                  format: int32
      tags:
        - Room
      responses:
        '200':
          $ref: '#/responses/no_error'
        default:
          $ref: '#/responses/default'
  /room/state/spec:
    post:
      summary: Describe available settings for a room
      description: |
        Return what settings are available for the given room and valid values.

        The information returned from this operation can then be used to determine valid options for the `/room/state/set` operation.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamUpdate'
      tags:
        - Room
        - Updates
      responses:
        '200':
          description: Specification of state parameters for a room
          schema:
            $ref: '#/definitions/RoomStateSpecResponse'
          examples:
            application/json:
              data:
                standby:
                  readonly: false
                standbyState:
                  enum:
                    - OFF
                    - MIXED
                    - ON
                  readonly: true
                mute:
                  readonly: false
                volume:
                  minimum: 0
                  maximum: 100
        default:
          $ref: '#/responses/default'
  /room/state/cancel_step:
    post:
      summary: Cancel Repeating Volume Step
      description: Stop ramping volume.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
      tags:
        - Room
      responses:
        '200':
          $ref: '#/responses/no_error'
        default:
          $ref: '#/responses/default'
  /room/play_state:
    post:
      summary: Get room's playback state
      description: |
        Controls the playback of the current source.

        If the client sets `update` > 0, a change to the `position` property will only trigger an update event on a seek or track change (i.e. on a non-linear change to the position). For per-second updates to the playback position, use the `/room/play_state/position` operation.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamUpdate'
      tags:
        - Room
        - Updates
      responses:
        '200':
          description: Playback state for the room
          schema:
            $ref: '#/definitions/RoomPlayStateResponse'
          examples:
            application/json:
              data:
                transport_state: buffering
                action: play
                queue_index: 3
                queue_length: 5
                position: 0
                position_min: 0
                position_max: 0
                repeat: false
                shuffle: true
                channel:
                  name: Podcasts R Us
                  type: Speech Radio
                  art_uri: http://1.2.3.4/podcasts.png
                details:
                  bit_depth: 24
                  bit_rate: 320000
                  codec_name: MP3
                  duration: 0
                  lossless: false
                  sample_rate: 44100
                metatext: The best podcasts in the world
                metadata:
                  class: md.track
                  id: track.123456
                  buffering: true
                  playing: false
                  selected: true
                  name: Go!
                  art_uri: http://127.0.0.1/art.png
                  album: The Race for Space
                  artist: Public Service Broadcasting
                  duration: 0
        default:
          $ref: '#/responses/default'
  /room/play_state/position:
    post:
      summary: Get position of playback
      description: |
        Return the position of playback for the current room.

        If the client sets `update` > 0, an update will be sent to the client every update period with the current playback position.
        This allows clients to easily poll the current playback position every second without having to set-up a session and filter out the rest of the `/room/play_state` data.

      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamUpdate'
      tags:
        - Room
        - Updates
      responses:
        '200':
          description: Playback state for the room
          schema:
            $ref: '#/definitions/RoomPlayStatePositionResponse'
          examples:
            application/json:
              data:
                position: 42
                position_min: 0
                position_max: 252
        default:
          $ref: '#/responses/default'
  /room/play_state/set:
    post:
      summary: Control the room's playback state
      description: |
        Controls the playback of the current source.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - type: object
              properties:
                action:
                  description: "If specified, sets the current transport state. `toggle` will toggle between states as follows: stop -> play; pause -> play; play -> pause if the current source supports pause else stop."
                  type: string
                  enum:
                    - stop
                    - play
                    - pause
                    - toggle
                shuffle:
                  description: If specified, sets the current shuffle state (off or shuffle all items).
                  type: boolean
                repeat:
                  description: If specified, sets the current repeat state (off or repeat entire queue).
                  type: boolean
                queue_index:
                  description: If specified, selects which track in the queue to play, otherwise operations are on the current track
                  type: integer
                  format: int32
                position:
                  description: If specified, sets the position within the track to move to
                  type: integer
                  format: int32
                skip_track:
                  description: If specified, number of tracks to skip. Negative values skip backwards. Can be repeated with skip_repeat.
                  type: integer
                  format: int32
                skip_position:
                  description: If specified, number of seconds to skip within the track. Negative values skip backwards. Can be repeated with skip_repeat.
                  type: integer
                  format: int32
                skip_repeat:
                  description: Number of times to repeat the skip operation (unless cancelled); only applicable if skip_track or skip_position specified.
                  type: integer
                  format: int32
                skip_interval:
                  description: Number of milliseconds between each skip repetition; only applicable if skip_track or skip_position specified.
                  type: integer
                  format: int32
      tags:
        - Room
      responses:
        '200':
          $ref: '#/responses/no_error'
        default:
          $ref: '#/responses/default'
  /room/play_state/spec:
    post:
      summary: Get playback control options
      description: |
        Return what playback control is possible for the current source and item.

        The information returned from this operation be used to determin what /room/play_state values and operations are valid in the current context, and thus define what UI elements should be displayed.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamUpdate'
      tags:
        - Room
        - Updates
      responses:
        '200':
          description: Play status parameters for a room
          schema:
            $ref: '#/definitions/RoomPlayControlSpecResponse'
          examples:
            application/json:
              data:
                action:
                  enum:
                    - play
                    - pause
                    - stop
                queue_index:
                  readonly: false
                position:
                  readonly: true
                repeat:
                  readonly: false
                shuffle:
                  readonly: false
                      
        default:
          $ref: '#/responses/default'
  /room/play_state/cancel_skip:
    post:
      summary: Cancel Repeating Skip
      description: Stop skipping forwards or backwards through source content.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
      tags:
        - Room
      responses:
        '200':
          $ref: '#/responses/no_error'
        default:
          $ref: '#/responses/default'
  /room/select:
    post:
      summary: Select For Playback
      description: |
        Selects some media item for playback in the given room.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - type: object
              required:
              - media_id
              properties:
                media_id:
                  description: Identifier that specifies what should be played.  The id is obtained either through a browse/link/match/search request or from the current play queue.
                  type: string
                queue:
                  description: If the item is queueable, specifies how it should modify the play queue.  If not specified, last is assumed.  If the item is not queueable, this parameter is ignored. `now` places the item(s) before what is currently playing, stops play and starts playing the new items. `next` places the item(s) after the currently playing item; `last` places the item(s) at the end of the queue; `replace` replaces the whole queue with the given item(s).
                  type: string
                  enum:
                    - now
                    - next
                    - last
                    - replace
      tags:
        - Room
        - Queue
      responses:
        '200':
          $ref: '#/responses/no_error'
        default:
          $ref: '#/responses/default'
  /room/endpoints:
    post:
      summary: Get available endpoints for a room
      description: Returns descriptions of available endpoints for a room.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamUpdate'
      tags:
        - Room
        - Browse
        - Updates
      responses:
        '200':
          description: List of the available media endpoints.
          schema:
            $ref: '#/definitions/RoomEndPointsResponse'
        default:
          $ref: '#/responses/default'
  /preset/save:
    post:
      summary: Save Preset
      description: |
        Saves a given media item as the named preset.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - type: object
              required:
              - preset_id
              - media_id
              properties:
                preset_id:
                  description: Identifier of the preset to initialise with the given media id.
                  type: string
                media_id:
                  description: Identifier of the item to use to create the preset.  If the identifier is a room identifier, the preset is created from the current play queue of that room.
                  type: string
      tags:
        - Room
        - Presets
      responses:
        '200':
          $ref: '#/responses/no_error'
        default:
          $ref: '#/responses/default'
  /preset/recall:
    post:
      summary: Recall Preset
      description: |
        Recalls a preset to play in a room.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - type: object
              required:
              - preset_id
              properties:
                preset_id:
                  description: Identifier of the preset to recall.
                  type: string
      tags:
        - Room
        - Presets
      responses:
