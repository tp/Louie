  /playlist/move:
    post:
      summary: Move Playlist Item
      description: Reorder a media item on a playlist.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - type: object
              required:
              - playlist_id
              - from_id
              properties:
                playlist_id:
                  type: string
                  description: Identifier of the playlist to modify.  If the identifier is a room identifier, the play queue of that room is modified.
                from_id:
                  type: string
                  description: Identifier of the item to move.
                to_id:
                  type: string
                  description: Identifier of the item before which the moved item should be inserted.  null (unspecified) will move the item to the end of the list.
      tags:
        - Playlist
        - Queue
      responses:
        '200':
          $ref: '#/responses/no_error'
        default:
          $ref: '#/responses/default'
  /playlist/remove:
    post:
      summary: Remove Playlist Item
      description: Remove a media item from a playlist.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - type: object
              required:
              - playlist_id
              - remove_id
              properties:
                playlist_id:
                  type: string
                  description: Identifier of the playlist to modify.  If the identifier is a room identifier, the play queue of that room is modified.
                remove_id:
                  type: string
                  description: Identifier of the item to remove.
      tags:
        - Playlist
        - Queue
      responses:
        '200':
          $ref: '#/responses/no_error'
        default:
          $ref: '#/responses/default'
  /playlist/clear:
    post:
      summary: Remove All Playlist Items
      description: Remove all media items from a playlist.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - type: object
              required:
              - playlist_id
              properties:
                playlist_id:
                  type: string
                  description: Identifier of the playlist to modify.  If the identifier is a room identifier, the play queue of that room is modified.
      tags:
        - Playlist
        - Queue
      responses:
        '200':
          $ref: '#/responses/no_error'
        default:
          $ref: '#/responses/default'

  /metadata/display_options:
    post:
      summary: Metadata Display Options
