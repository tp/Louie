        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamFilter'
            - $ref: '#/definitions/ParamSessionOptional'
            - $ref: '#/definitions/ParamTag'
            - type: object
              required:
              - class
              properties:
                class:
                  type: string
                  description: Identifier of the class of metadata for which to get display options.
      tags:
        - Browse
      responses:
        '200':
          description: Description of how to display the metadata.
          schema:
            $ref: '#/definitions/MetadataDisplayOptionsResponse'
        default:
          $ref: '#/responses/default'

  /media/unused:
    get:
      summary: Unused
      description: Dummy action used to reference derived metadata types that are otherwise unreferenced to avoid Swagger displaying warning messages.
      responses:
        '200':
          description: Tidal track metadata
          schema:
            $ref: '#/definitions/ItemMetaDataTidalTrack'
        '201':
          description: Tidal album metadata
          schema:
            $ref: '#/definitions/ItemMetaDataTidalAlbum'
        '202':
          description: Tidal playlist metadata
          schema:
            $ref: '#/definitions/ItemMetaDataTidalPlaylist'
        default:
          $ref: '#/responses/default'
  /V2/api/version:
    get:
      summary: Query API Version
      description: |
        Get version information about this API.  This API request is guaranteed to always exist and always return the same format response to allow clients to determine whether they are compatible with this system.
      parameters:
        - name: body
          required: false
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
      tags:
        - API V2
      responses:
        '200':
          description: API version information
          schema:
            $ref: '#/definitions/V2APIVersionResponse'
          examples:
            session: session_id
            tag: tag_01
            data:
                currentVersion: 1.0.0
                onDevice: true
        default:
          $ref: '#/responses/default'
  /V2/topology/status:
    get:
      summary: Get key information about current house topology
      description: |
        Returns a list of currently available rooms with their user-defined names. Information about their UDN, host address, static zone recievers (for Kustom DSM streams), and listening rooms.

        If the client sets `update` > 0, an update will be sent to the client every update period with the up-to-date topology
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamUpdate'
      tags:
        - API V2
      responses:
        '200':
          description: List of rooms and key information about them
          schema:
            $ref: '#/definitions/V2TopologyStatusResponse'
          examples:
            application/json:
              tag: tag_01
              data:
                rooms:
                  - name: Living Room
                    udn: 4c494e4e-0026-0f22-3df0-1487425-0006
                    location: 192.168.0.135
                    isStaticZoneReceiver: false
                    staticZoneReceivers: []
                    listeners: []
                  - name: Bedroom
                    udn: 4c494e4e-0026-0f22-3df0-1487425-0009
                    location: 192.168.0.133
                    isStaticZoneReceiver: false
                    staticZoneReceivers: []
                    listeners: []
                  - name: En-Suite
                    udn: 4c494e4e-0026-0f22-3df0-1487425-0010
                    location: 192.168.0.143
                    isStaticZoneReceiver: false
                    staticZoneReceivers: []
                    listeners: []
              session: sessionid
        default:
          $ref: '#/responses/default'
  /V2/topology/group:
    post:
      summary: Add and remove room grouping
      description: This modifies the grouping of rooms, adding rooms to and removing them from a master room.  The room parameter indicates the master.  The API supports multiple simultaneous additions and removals to avoid an unpleasant slow ripple effect in the UI as the grouping changes one by one.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              properties:
                add:
                  description: The ids of the rooms to add to the master room's group.
                  type: array
                  items:
                    type: string
                remove:
                  description: The ids of the rooms to remove from the master room's group.
                  type: array
                  items:
                    type: string
      tags:
        - API V2
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/product/status:
    get:
      summary: Query product status of room
      description: |
        Returns the standby state of the room.

        If the client sets `update` > 0, an update will be sent to the client every update period with the up-to-date product status
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamUpdate'
      tags:
        - API V2
      responses:
        '200':
          description: Product status parameters for a room
          schema:
            $ref: '#/definitions/V2ProductStatusResponse'
          examples:
            application/json:
              tag: tag_01
              room: Main Room
              data:
                standby: false
              session: sessionid
        default:
          $ref: '#/responses/default'
  /V2/product/set_standby:
    post:
      summary: Set standby state of room
      description: Sets the standby state of the room. True for standby active, False for standby off
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              properties:
                standby:
                  description: If specified, sets the standby state of the room.
                  type: boolean
      tags:
        - API V2
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/sources/status:
    get:
      summary: Query sources status of room
      description: | 
        Returns descriptions of the visible sources available and the current source of a room

        If the client sets `update` > 0, an update will be sent to the client every update period with the up-to-date sources status
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamUpdate'
      tags:
        - API V2
      responses:
        '200':
          description: Sources status parameters for a room
          schema:
            $ref: '#/definitions/V2SourcesStatusResponse'
          examples:
            application/json:
              tag: tag_01
              room: Main Room
              data:
                visible_sources:
                  - system_name: Analog1
                    display_name: LP12
                    type: Analog
                  - system_name: Front Aux
                    display_name: Front Aux
                    type: Analog
                  - system_name: HDMI1
                    display_name: PS5
                    type: Hdmi
                current_source:
                  system_name: Analog1
                  display_name: LP12
                  type: Analog
              session: sessionid
        default:
          $ref: '#/responses/default'
  /V2/sources/set:
    post:
      summary: Select source by system name for playback
      description: Selects a source by its system name for playback in the given room.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              required:
              - name
              properties:
                system_name:
                  description: System name of the source for playback
                  type: string
      tags:
        - API V2
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/pins/status:
    get:
      summary: Query pin status of room
      description: | 
        Returns information about the pin contents for chosen room

        If the client sets `update` > 0, an update will be sent to the client every update period with the up-to-date pins status
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamUpdate'
      tags:
        - API V2
      responses:
        '200':
          description: Pins status parameters for the room
          schema:
            $ref: '#/definitions/V2PinsStatusResponse'
          examples:
            application/json:
              tag: tag_01
              room: Main Room
              data:
                pin_list:
                  - id: pin1id
                    name: Qobuz Top 50
                    art_uri: http://127.0.0.1/art.png
                  - id: pin2id
                    name: Rumours
                    art_uri: http://127.0.0.1/art.png
                  - id: pin3id
                    name: Dark Side of the Moon
                    art_uri: http://127.0.0.1/art.png
                  - name: Empty 
                  - name: Empty 
                  - name: Empty
              session: sessionid
        default:
          $ref: '#/responses/default'
  /V2/pins/set:
    post:
      summary: Set media content to a pin
      description: |
        Sets pin with new media item
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              properties:
                pin_index:
                  description: Index of the pin to be set. An integer value between 1 and 6
                  type: integer
                  format: int32
                media_id:
                  description: Identifier that specifies what should be set to the pin.  The id is obtained either through a browse/link/match/search request or from the current play queue.
                  type: string
      tags:
        - API V2
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/volume/status:
    get:
      summary: Query volume status of room
      description: |
        Return the mute and volume states of the room.

        If the client sets `update` > 0, an update will be sent to the client every update period with the up-to-date volume status.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamUpdate'
            - type: object
              properties:
                group:
                  description: If specified and true and the room is a member of a group, the values returned are for the group as a whole.
                  type: boolean
      tags:
        - API V2
      responses:
        '200':
          description: Volume status parameters for a room
          schema:
            $ref: '#/definitions/V2VolumeStatusResponse'
          examples:
            application/json:
              tag: tag_01
              room: Main Room
              data:
                mute: false
                volume: 50
              session: sessionid
        default:
          $ref: '#/responses/default'
  /V2/volume/step_vol:
    post:
      summary: Step volume of room
      description: |
        Step the volume level of a room. If a setting is specified in the parameter, the volume is increased or decreased by the specified step value.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              properties:
                volume_step:
                  description: If specified, perform a relative volume level change. Negative values lower the volume.
                  type: integer
                  format: int32
                group:
                  description: If specified and the room is a group master, all rooms in the group are modified.
                  type: boolean
      tags:
        - API V2
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/volume/set_vol:
    post:
      summary: Set volume of room by an absolute value
      description: |
        Sets the volume level of a room. If a setting is specified in the parameter, the volume will change to that value (within the volume limits).
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              properties:
                volume:
                  description: If specified, perform an absolute volume level change.
                  type: integer
                  format: int32
                group:
                  description: If specified and the room is a group master, all rooms in the group are modified.
                  type: boolean
      tags:
        - API V2
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/volume/set_mute:
    post:
      summary: Set mute state of room
      description: |
        Sets the mute state of a room. If a setting is specified in the parameter, the mute state is changed to the new value.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              properties:
                mute:
                  description: If specified, sets the mute state of the room.
                  type: boolean
                group:
                  description: If specified and the room is a group master, all rooms in the group are modified.
                  type: boolean
      tags:
        - API V2
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/transport/status:
    get:
      summary: Query transport status of room
      description: |
        Return the transport status of the room.

        If the client sets `update` > 0, an update will be sent to the client every update period with the up-to-date transport status
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamUpdate'
      tags:
        - API V2
      responses:
        '200':
          description: Transport status parameters for a room
          schema:
            $ref: '#/definitions/V2TransportStatusResponse'
          examples:
            application/json:
              tag: tag_01
              room: Main Room
              data:
                transport_state: buffering
                shuffle: true
                repeat: false
              session: sessionid
        default:
          $ref: '#/responses/default'
  /V2/transport/play:
    post:
      summary: Set transport state of room to 'play'
      description: |
        Sets the transport state of the room to 'play'.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
      tags:
        - API V2
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/transport/pause:
    post:
      summary: Set transport state of room to 'pause'
      description: |
        Sets the transport state of the room to 'pause'.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
      tags:
        - API V2
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/transport/set_shuffle:
    post:
      summary: Set shuffle state of room
      description: |
        Sets the shuffle state of the room
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              properties:
                shuffle:
                  description: If specified, sets the current shuffle state (off or shuffle all items).
                  type: boolean
      tags:
        - API V2
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/transport/set_repeat:
    post:
      summary: Set repeat state of room
      description: |
        Set the repeat state of the room
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              properties:
                repeat:
                  description: If specified, sets the current repeat state (off or repeat entire queue).
                  type: boolean
      tags:
        - API V2
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/transport/skip_track:
    post:
      summary: Skip tracks by specified index
      description: |
        Skips to previous/next track in the active playlist if relevant to active source
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              properties:
                skip_track:
                  description: If specified, direction to skip. Negative value to skip backwards, positive value to skip forward.
                  type: integer
                  format: int32
      tags:
        - API V2
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/seek/status:
    get:
      summary: Query seek status of what is currently playing in a room
      description: | 
        Returns information about whether the currently playing media item is seekable and if it is the running length and the current time elapsed

        If the client sets `update` > 0, an update will be sent to the client every update period with the up-to-date seek status
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamUpdate'
      tags:
        - API V2
      responses:
        '200':
          description: List of the available services for a room.
          schema:
            $ref: '#/definitions/V2SeekStatusResponse'
        default:
          $ref: '#/responses/default'
  /V2/seek/set_position:
    post:
      summary: Skip to absolute position in currently playing item
      description: |
        Skips to absolute position in the currently playing item if relevant to active source
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              properties:
                position:
                  description: If specified, absolute position to change to
                  type: integer
                  format: int32
      tags:
        - API V2
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/metadata/status:
    get:
      summary: Query metadata status of room
      description: |
        Returns information on room's metadata specifically for LinnLite module's metadata signal outputs (contents is dependant on source type). 

        If the client sets `update` > 0, an update will be sent to the client every update period with the up-to-date metadata status
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamUpdate'
      tags:
        - API V2
      responses:
        '200':
          description: Metadata status parameters for a room
          schema:
            $ref: '#/definitions/V2MetadataStatusResponse'
          examples:
            application/json:
              tag: tag_01
              metadata:
                line_1: Go!
                line_2: Public Service Broadcasting
                line_3: The Race for Space
                art_uri: http://127.0.0.1/art.png
              session: sessionid
              room: Living Room
        default:
          $ref: '#/responses/default'
  /V2/playlist/browse:
    get:
      summary: Browse the playlist of a room
      description: | 
        Returns descriptions of media items within the room's playlist, including index references that allow them to be played using the /V2/playlist/select endpoint.
        
        This endpoint can also be used to query the number of tracks in the room's playlist - making a request with a 'count' value of 0 will still return a response with the 'total'
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              required:
              - index
              - count
              - concise
              properties:
                index:
                  type: integer
                  description: Zero-based offset into the list of children for the item from which to return information.
                count:
                  type: integer
                  description: Number of child items to return.
      tags:
        - API V2 - Playlist
      responses:
        '200':
          description: Browse content for the given identifier
          schema:
            $ref: '#/definitions/V2PlaylistBrowseResponse'
        default:
          $ref: '#/responses/default'
  /V2/playlist/subscribe:
    get:
      summary: Subscribe to the playlist of a room
      description: | 
        Returns descriptions of media items within the room's playlist, including index references that allow them to be played using the /V2/playlist/select endpoint. 
        
        Gives updates whenever the media content changes. To unsubscribe, enter the room into the unsubscribe endpoint. This endpoint can also be used to monitor the number of tracks in the room's playlist - making a request with a 'count' value of 0 will still return updates with the 'total' value.

        The 'concise' flag allows for a more efficient updating system with significantly reduced communications. If a track has simply moved to a new position, without any properties changing, a "previously_at_index" properties is used to identify its position in the previous update. Using this will therefore require additional logic on the client side.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              required:
              - index
              - count
              - concise
              properties:
                index:
                  type: integer
                  description: Zero-based offset into the list of children for the item from which to return information.
                count:
                  type: integer
                  description: Number of child items to return.
                concise:
                  type: boolean
                  description: Enables concise updating.
      tags:
        - API V2 - Playlist
      responses:
        '200':
          description: Browse content for the given identifier
          schema:
            $ref: '#/definitions/V2PlaylistSubscribeResponse'
        default:
          $ref: '#/responses/default'
  /V2/playlist/unsubscribe:
    post:
      summary: Remove subscription to the playlist of a room
      description: | 
        Enter a media identifier that is currently pushing updates and stop further updates.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
      tags:
        - API V2 - Playlist
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/playlist/select:
    post:
      summary: Select a playlist item for playback
      description: |
        Selects an item within a room's playlist by index to become the actively playing track.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              required:
              - index
              properties:
                index:
                  type: integer
                  description: Zero-based index of the position in the room playlist to select.
      tags:
        - API V2 - Playlist
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/playlist/move_to_top:
    post:
      summary: Move an item in a room's playlist to the top
      description: |
        Takes in the index of an item in the room's active playlist and moves it to the first position in the DS playlist
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              required:
              - index
              properties:
                index:
                  type: integer
                  description: Zero-based index of the item's position in the room playlist to move.
      tags:
        - API V2 - Playlist
      responses:
        '200':
          $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/playlist/move_up:
    post:
      summary: Move an item up in a room's playlist
      description: |
        Takes in the index of an item in the room's active playlist and moves it up one position in the DS playlist
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              required:
                - index
              properties:
                index:
                  type: integer
                  description: Zero-based index of the item's position in the room playlist to move.
      tags:
        - API V2 - Playlist
      responses:
        '200':
          description: Successful response.
          schema:
            $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/playlist/move_down:
    post:
      summary: Move an item down in a room's playlist
      description: |
        Takes in the index of an item in the room's active playlist and moves it down one position in the DS playlist
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              required:
                - index
              properties:
                index:
                  type: integer
                  description: Zero-based index of the item's position in the room playlist to move.
      tags:
        - API V2 - Playlist
      responses:
        '200':
          description: Successful response.
          schema:
            $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/playlist/move_to_end:
    post:
      summary: Move an item in a room's playlist to the end
      description: |
        Takes in the index of an item in the room's active playlist and moves it to the last position in the DS playlist
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              required:
                - index
              properties:
                index:
                  type: integer
                  description: Zero-based index of the item's position in the room playlist to move.
      tags:
        - API V2 - Playlist
      responses:
        '200':
          description: Successful response.
          schema:
            $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/playlist/remove:
    post:
      summary: Remove an item from a room's playlist
      description: |
        Takes in the index of an item in the room's active playlist and removes it from the DS playlist
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              required:
                - index
              properties:
                index:
                  type: integer
                  description: Zero-based index of the item's position in the room playlist to move.
      tags:
        - API V2 - Playlist
      responses:
        '200':
          description: Successful response.
          schema:
            $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/playlist/clear:
    post:
      summary: Clear a room's playlist
      description: |
        Clears all media items from the room's active playlist
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
      tags:
        - API V2 - Playlist
      responses:
        '200':
          description: Successful response.
          schema:
            $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/playlist/favourite:
    post:
      summary: Set favourite flag for a playlist item
      description: Marks or unmarks an item within a room's playlist as a favourite. The selected item is chosen by index.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              required:
              - index
              - favourite
              properties:
                index:
                  type: integer
                  description: Zero-based index of the item's position in the room playlist.
                favourite:
                  type: boolean
                  description: True to set as favourite, false to clear.
      tags:
        - API V2 - Playlist
      responses:
        '200':
          description: Successful response.
          schema:
            $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/playlist/save:
    post:
      summary: Save room's playlist as a new cloud playlist
      description: |
        Creates a new cloud playlist from the contents of a room's playlist with a chosen name.

        Must be logged into a Linn account through the gateway settings.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - type: object
              required:
              - name
              properties:
                name:
                  type: string
                  description: Name that the new cloud playlist will take.
      tags:
        - API V2 - Playlist
      responses:
        '200':
          description: Successful response.
          schema:
            $ref: '#/responses/success_room'
        default:
          $ref: '#/responses/default'
  /V2/services/status:
    get:
      summary: Query serivces status of room
      description: | 
        Returns the services available to the room

        If the client sets `update` > 0, an update will be sent to the client every update period with the up-to-date service status
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - $ref: '#/definitions/ParamRoom'
            - $ref: '#/definitions/ParamUpdate'
      tags:
        - API V2 - Services
      responses:
        '200':
          description: List of the available services for a room.
          schema:
            $ref: '#/definitions/V2ServicesStatusResponse'
        default:
          $ref: '#/responses/default'
  /V2/services/search:
    get:
      summary: Search a service by type and a search argument
      description:  |
        Returns descriptions of available media items that match the search argument, including references that allow them to be played on the media player or browsed further.

        A search type must also be specified. Available types depending on the service, "albums", "artists", "tracks", "playlists", "composers", "stations" 
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - type: object
              required:
              - media_id
              - class
              - search
              - index
              - count
              properties:
                media_id:
                  type: string
                  description: Identifier of the service you wish to search.
                search_arg:
                  type: string
                  description: Search argument used to find results.
                search_type:
                  type: string
                  description: Type of search results to be returned.
                index:
                  type: integer
                  description: Zero-based offset into the matching items from which to return information.
                count:
                  type: integer
                  description: Number of child items to return.
      tags:
        - API V2 - Services
      responses:
        '200':
          description: Browse content for the given identifier
          schema:
            $ref: '#/definitions/MediaBrowseResponse'
        default:
          $ref: '#/responses/default'
  /V2/services/playlist_remove:
    post:
      summary: Remove item from a playlist
      description: Remove a media item from a playlist of a service. Currently only supports cloud playlists service.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - type: object
              required:
              - playlist_id
              - remove_id
              properties:
                playlist_id:
                  type: string
                  description: Identifier of the service playlist to modify.
                remove_id:
                  type: string
                  description: Identifier of the item to remove.
      tags:
        - API V2 - Services
      responses:
        '200':
          $ref: '#/responses/success'
        default:
          $ref: '#/responses/default'
  /V2/services/playlist_delete:
    post:
      summary: Deletes an existing playlist
      description: Removes an existing service playlist. Currently only supports cloud playlists service.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - type: object
              required:
              - playlist_id
              properties:
                playlist_id:
                  type: string
                  description: Identifier of the service playlist to destroy.
      tags:
        - API V2 - Services
      responses:
        '200':
          $ref: '#/responses/success'
        default:
          $ref: '#/responses/default'
  /V2/media/browse:
    get:
      summary: Browse media content
      description: |
        Returns descriptions of available media items, including references that allow them to be played on the media player.

        When browsing a media server the "type" must also be specified ('albums', 'artists' or 'genres'). Otherwise type can be null.
      parameters:
        - name: body
          required: true
          in: body
          schema:
            allOf:
            - $ref: '#/definitions/ParamTag'
            - $ref: '#/definitions/ParamSession'
            - type: object
              required:
              - media_id
              - index
              - count
              - browse_type
              properties:
                media_id:
                  type: string
                  description: Identifier of the item in the browse hierarchy for which to return browse information.
                index:
                  type: integer
                  description: Zero-based offset into the list of children for the item from which to return information.
                count:
                  type: integer
                  description: Number of child items to return.
                browse_type:
                  type: string
                  description: Type required only when browsing media servers.
      tags:
        - API V2 - Media
      responses:
        '200':
          description: Browse content for the given identifier
          schema:
            $ref: '#/definitions/MediaBrowseResponse'
        default:
          $ref: '#/responses/default'
